<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Profile | Glow Beauty</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<style>
body{
    background:#f8f9fa;
}

.profile-card{
    background:#fff;
    border-radius:15px;
    box-shadow:0 5px 20px rgba(0,0,0,.08);
}

.profile-img{
    width:120px;
    height:120px;
    border-radius:50%;
    object-fit:cover;
    border:4px solid #ff4d6d;
}

.list-group-item{
    border:none;
    padding:15px;
}

.btn-pink{
    background:#ff4d6d;
    color:white;
}

.btn-pink:hover{
    background:#e63956;
    color:white;
}
</style>

</head>

<body>

<!-- Navbar -->

<nav class="navbar navbar-expand-lg bg-white shadow-sm">
<div class="container">

<a class="navbar-brand fw-bold text-danger" href="index.html">
Glow Beauty
</a>

<div class="ms-auto">
<a href="index.html" class="btn btn-outline-danger">
<i class="bi bi-house"></i> Home
</a>
</div>

</div>
</nav>

<div class="container py-5">

<div class="row">

<!-- Left Panel -->

<div class="col-lg-4 mb-4">

<div class="profile-card p-4 text-center">

<img src="https://img.freepik.com/premium-vector/avatar-profile-icon-flat-style-female-user-profile-vector-illustration-isolated-background-women-profile-sign-business-concept_157943-38866.jpg" class="profile-img mb-3">

<h4 id="userName">Anagha Bhat</h4>

<p class="text-muted" id="userEmail">
anaghabhat920@gmail.com
</p>

<button class="btn btn-pink w-100 mt-3">
Edit Profile
</button>

</div>

<div class="profile-card mt-4">

<div class="list-group list-group-flush">

<a href="#" class="list-group-item">
<i class="bi bi-person"></i>
Personal Information
</a>

<a href="myorders.html" class="list-group-item">
<i class="bi bi-bag"></i>
My Orders
</a>

<a href="wishlist.html" class="list-group-item">
<i class="bi bi-heart"></i>
Wishlist
</a>

<a href="cart.html" class="list-group-item">
<i class="bi bi-cart3"></i>
Cart
</a>


<a href="login.html" class="list-group-item text-danger">
<i class="bi bi-box-arrow-right"></i>
Logout
</a>

</div>

</div>

</div>

<!-- Right Panel -->

<div class="col-lg-8">

<div class="profile-card p-4">

<h3 class="mb-4">
Personal Details
</h3>

<div class="row">

<div class="col-md-6 mb-3">

<label class="form-label">Full Name *</label>

<input type="text"
class="form-control"
placeholder="Enter your full name">

</div>

<div class="col-md-6 mb-3">

<label class="form-label">Email *</label>

<input type="email"
class="form-control"
placeholder="Enter your email">

</div>

<div class="col-md-6 mb-3">

<label class="form-label">Phone *</label>

<input type="text"
class="form-control"
placeholder="Enter your phone number">

</div>

<div class="col-md-6 mb-3">

<label class="form-label">Gender</label>

<select class="form-select" >

<option>Female</option>
<option>Male</option>
<option>Other</option>

</select>

</div>

<div class="col-12 mb-3">

<label class="form-label">Address *</label>

<textarea class="form-control" rows="3" placeholder="Enter your address"></textarea>

</div>

<div class="col-12">

<button class="btn btn-pink">
Save Changes
</button>

</div>

</div>

</div>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
