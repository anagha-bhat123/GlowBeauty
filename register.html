<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glow Beauty | Register</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
<script src="nykaa.js"></script>

    <style>
        body{
            background:linear-gradient(135deg,#ffe6ef,#fff);
            min-height:100vh;
        }

        .register-card{
            border:none;
            border-radius:20px;
            box-shadow:0 10px 30px rgba(0,0,0,.15);
            overflow:hidden;
        }

        .left-panel{
            background:linear-gradient(135deg,#ff4f81,#ff7eb3);
            color:#fff;
            padding:50px;
        }

        .right-panel{
            padding:40px;
        }

        .strength{
            height:8px;
            border-radius:20px;
            background:#ddd;
            overflow:hidden;
            margin-top:8px;
        }

        .strength span{
            display:block;
            height:100%;
            width:0%;
            transition:.3s;
        }
    </style>
</head>

<body>

<div class="container py-5">

<div class="row justify-content-center">

<div class="col-lg-10">

<div class="card register-card">

<div class="row g-0">

<!-- Left -->

<div class="col-md-5 left-panel d-flex flex-column justify-content-center">

<h2>Create Account</h2>

<p class="mt-3">
Join Glow Beauty and enjoy exclusive offers,
premium skincare, makeup and fragrances.
</p>

<i class="bi bi-person-plus-fill display-1 mt-3"></i>

</div>

<!-- Right -->

<div class="col-md-7 right-panel">

<h3 class="text-center mb-4">Register</h3>

<form id="registerForm">

<div class="mb-3">

<label>Full Name</label>

<input type="text"
id="name"
class="form-control"
placeholder="Enter Full Name">

</div>

<div class="mb-3">

<label>Email</label>

<input type="email"
id="email"
class="form-control"
placeholder="Enter Email">

</div>

<div class="mb-3">

<label>Mobile Number</label>

<input type="tel"
id="mobile"
class="form-control"
placeholder="Enter Mobile Number">

</div>

<div class="mb-3">

<label>Password</label>

<div class="input-group">

<input
type="password"
id="password"
class="form-control"
placeholder="Create Password">

<button
class="btn btn-outline-secondary"
type="button"
id="togglePassword">

<i class="bi bi-eye"></i>

</button>

</div>

<div class="strength">
    <span id="strengthBar"></span>
</div>

<small id="strengthText"></small>

</div>

<div class="mb-3">

<label>Confirm Password</label>

<input
type="password"
id="confirmPassword"
class="form-control"
placeholder="Confirm Password">

</div>

<div class="form-check mb-3">

<input
class="form-check-input"
type="checkbox"
id="terms">

<label class="form-check-label">
I agree to the Terms & Conditions
</label>

</div>

<button class="btn btn-pink w-100">
Create Account
</button>

<div class="text-center mt-3">

Already have an account?

<a href="login.html">Login</a>

</div>

</form>

</div>

</div>

</div>

</div>

</div>

</div>

<script>

const password=document.getElementById("password");
const strengthBar=document.getElementById("strengthBar");
const strengthText=document.getElementById("strengthText");

password.addEventListener("keyup",()=>{

let value=password.value;

if(value.length<6){

strengthBar.style.width="30%";
strengthBar.style.background="red";
strengthText.innerHTML="Weak Password";

}

else if(value.length<10){

strengthBar.style.width="65%";
strengthBar.style.background="orange";
strengthText.innerHTML="Medium Password";

}

else{

strengthBar.style.width="100%";
strengthBar.style.background="green";
strengthText.innerHTML="Strong Password";

}

});

document.getElementById("togglePassword").onclick=()=>{

password.type=password.type==="password"?"text":"password";

};

document.getElementById("registerForm").addEventListener("submit",function(e){

e.preventDefault();

const name=document.getElementById("name").value.trim();
const email=document.getElementById("email").value.trim();
const mobile=document.getElementById("mobile").value.trim();
const pass=password.value;
const confirm=document.getElementById("confirmPassword").value;
const terms=document.getElementById("terms").checked;

if(name===""||email===""||mobile===""||pass===""||confirm===""){

Swal.fire("Error","Please fill all fields.","error");
return;

}

if(!email.includes("@")){

Swal.fire("Invalid Email","Please enter a valid email.","warning");
return;

}

if(mobile.length!==10){

Swal.fire("Invalid Mobile","Mobile number must contain 10 digits.","warning");
return;

}

if(pass!==confirm){

Swal.fire("Password Mismatch","Passwords do not match.","error");
return;

}

if(!terms){

Swal.fire("Terms Required","Please accept the Terms & Conditions.","warning");
return;

}

Swal.fire({

icon:"success",

title:"Registration Successful",

text:"Welcome to Glow Beauty!",

confirmButtonColor:"#ff4f81"

}).then(()=>{

window.location="login.html";

});

});

</script>

</body>
</html>
