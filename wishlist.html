<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wishlist | Glow Beauty</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <link rel="stylesheet" href="style.css">
<script src="nykaa.js"></script>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm sticky-top">
  <div class="container">
    <a class="navbar-brand fw-bold text-danger" href="index.html">Glow Beauty</a>
    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="menu">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a href="index.html" class="nav-link">Home</a></li>
        <li class="nav-item"><a href="products.html" class="nav-link">Products</a></li>
        <li class="nav-item">
          <a href="wishlist.html" class="nav-link active position-relative">
            <i class="bi bi-heart fs-5"></i>
            <span id="wishlistCount" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">0</span>
          </a>
        </li>
        <li class="nav-item">
          <a href="cart.html" class="nav-link position-relative">
            <i class="bi bi-cart3 fs-5"></i>
            <span id="cartCount" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">0</span>
          </a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<!-- Header -->
<section class="py-5 text-center hero">
  <div class="container">
    <h1>My Wishlist</h1>
    <p>Products you love, saved for later.</p>
  </div>
</section>

<!-- Wishlist Grid -->
<div class="container my-5">
  <div id="emptyMsg" class="text-center py-5" style="display:none;">
    <i class="bi bi-heart display-1 text-muted"></i>
    <h4 class="mt-3 text-muted">Your wishlist is empty</h4>
    <a href="products.html" class="btn btn-pink mt-3">Browse Products</a>
  </div>
  <div class="row g-4" id="wishlistGrid"></div>
</div>

<!-- Footer -->
<footer class="bg-dark text-white text-center p-4">
  <p class="mb-0">© 2026 Glow Beauty. All Rights Reserved.</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  let wishlist = JSON.parse(localStorage.getItem("wishlist")) || [];
  let cart     = JSON.parse(localStorage.getItem("cart"))     || [];
  const grid   = document.getElementById("wishlistGrid");

  function updateCounters() {
    const totalQty = cart.reduce((s, i) => s + i.qty, 0);
    const cc = document.getElementById("cartCount");
    const wc = document.getElementById("wishlistCount");
    if (cc) cc.innerText = totalQty;
    if (wc) wc.innerText = wishlist.length;
  }

  function renderWishlist() {
    grid.innerHTML = "";
    const emptyMsg = document.getElementById("emptyMsg");

    if (wishlist.length === 0) {
      emptyMsg.style.display = "block";
      updateCounters();
      return;
    }
    emptyMsg.style.display = "none";

    wishlist.forEach((item, index) => {
      const col = document.createElement("div");
      col.className = "col-md-4 col-lg-3";
      col.innerHTML = `
        <div class="card product-card h-100 text-center">
          <img src="${item.image}" class="card-img-top" style="height:220px;object-fit:cover;" alt="${item.name}">
          <div class="card-body">
            <h5>${item.name}</h5>
            <p class="product-price text-danger fw-bold">&#8377;${item.price}</p>
            <button class="btn btn-pink addToCartWish mb-2" data-index="${index}">
              <i class="bi bi-cart3"></i> Add to Cart
            </button>
            <br>
            <button class="btn btn-outline-danger removeWish mt-2" data-index="${index}">
              <i class="bi bi-trash"></i> Remove
            </button>
          </div>
        </div>
      `;
      grid.appendChild(col);
    });
    updateCounters();
  }

  grid.addEventListener("click", function(e) {
    const addBtn    = e.target.closest(".addToCartWish");
    const removeBtn = e.target.closest(".removeWish");

    if (addBtn) {
      const i = parseInt(addBtn.dataset.index);
      const item = wishlist[i];
      const existing = cart.find(c => c.name === item.name);
      if (existing) {
        existing.qty++;
      } else {
        cart.push({ id: Date.now(), name: item.name, price: item.price, image: item.image, qty: 1 });
      }
      localStorage.setItem("cart", JSON.stringify(cart));
      updateCounters();
      Swal.fire({ icon: "success", title: "Added to Cart", text: item.name + " added!", confirmButtonColor: "#ff4f81", timer: 1500, showConfirmButton: false });
    }

    if (removeBtn) {
      const i = parseInt(removeBtn.dataset.index);
      const name = wishlist[i].name;
      Swal.fire({
        title: "Remove from Wishlist?",
        text: name + " will be removed.",
        icon: "warning",
        showCancelButton: true,
        confirmButtonColor: "#e91e63",
        cancelButtonColor: "#aaa",
        confirmButtonText: "Remove"
      }).then(result => {
        if (result.isConfirmed) {
          wishlist.splice(i, 1);
          localStorage.setItem("wishlist", JSON.stringify(wishlist));
          renderWishlist();
        }
      });
    }
  });

  renderWishlist();
</script>
</body>
</html>
