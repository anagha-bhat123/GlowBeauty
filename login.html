<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glow Beauty | Login</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- SweetAlert -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
<script src="nykaa.js"></script>

    <style>
        body {
            background: linear-gradient(135deg, #ffe6ef, #fff);
            min-height: 100vh;
        }

        .login-card {
            border: none;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,.15);
            overflow: hidden;
        }

        .login-left {
            background: linear-gradient(135deg,#ff4f81,#ff7eb3);
            color: white;
            padding: 50px;
        }

        .login-right {
            padding: 40px;
        }

        .form-control {
            border-radius: 12px;
        }

        .toggle-password {
            cursor: pointer;
        }
    </style>
</head>

<body>

<div class="container py-5">

<div class="row justify-content-center align-items-center">

<div class="col-lg-10">

<div class="card login-card">

<div class="row g-0">

<!-- Left Side -->

<div class="col-md-5 login-left d-flex flex-column justify-content-center">

<h2 class="fw-bold">Welcome Back!</h2>

<p class="mt-3">
Sign in to continue shopping your favorite beauty products.
</p>

<i class="bi bi-stars display-1 mt-3"></i>

</div>

<!-- Right Side -->

<div class="col-md-7 login-right">

<h3 class="text-center mb-4">Login</h3>

<form id="loginForm">

<div class="mb-3">

<label>Email</label>

<input
type="email"
id="email"
class="form-control"
placeholder="Enter Email">

</div>

<div class="mb-3">

<label>Password</label>

<div class="input-group">

<input
type="password"
id="password"
class="form-control"
placeholder="Enter Password">

<button
class="btn btn-outline-secondary"
type="button"
id="togglePassword">

<i class="bi bi-eye"></i>

</button>

</div>

</div>

<div class="d-flex justify-content-between mb-3">

<div>

<input type="checkbox">

Remember Me

</div>

<a href="#">Forgot Password?</a>

</div>

<button class="btn btn-pink w-100">

Login

</button>

<div class="text-center mt-4">

Don't have an account?

<a href="register.html">

Register

</a>

</div>

</form>

</div>

</div>

</div>

</div>

</div>

</div>

<script>

const form=document.getElementById("loginForm");

const email=document.getElementById("email");

const password=document.getElementById("password");

const toggle=document.getElementById("togglePassword");

toggle.onclick=()=>{

password.type=password.type==="password"
?"text":"password";

toggle.innerHTML=password.type==="password"
?'<i class="bi bi-eye"></i>'
:'<i class="bi bi-eye-slash"></i>';

}

form.addEventListener("submit",function(e){

e.preventDefault();

if(email.value===""||password.value===""){

Swal.fire({

icon:"error",

title:"Oops!",

text:"Please fill all fields.",

confirmButtonColor:"#ff4f81"

});

return;

}

if(!email.value.includes("@")){

Swal.fire({

icon:"warning",

title:"Invalid Email",

text:"Enter a valid email address.",

confirmButtonColor:"#ff4f81"

});

return;

}

Swal.fire({

icon:"success",

title:"Login Successful",

text:"Welcome to Glow Beauty!",

confirmButtonColor:"#ff4f81"

}).then(()=>{

window.location="index.html";

});

});

</script>

</body>

</html>
